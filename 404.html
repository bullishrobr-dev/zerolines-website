<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Zero Lines</title>
  <meta name="description" content="The page you are looking for does not exist. Explore Zero Lines skincare.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/index-BELDyRU9.css">
  <style>
    :root {
      --bg-primary: #0A0A0A;
      --text-primary: #F5F5F5;
      --text-secondary: #888888;
      --accent: #0ABAB5;
      --border: rgba(255,255,255,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 400;
      line-height: 1;
      color: rgba(255,255,255,0.06);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
      user-select: none;
    }
    .content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }
    .eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
    .link-btn {
      padding: 0.875rem 1.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    .link-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .link-btn.primary {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }
    .link-btn.primary:hover {
      background: #0bc4bf;
      border-color: #0bc4bf;
    }
    .footer {
      position: absolute;
      bottom: 2rem;
      color: var(--text-secondary);
      font-size: 0.8125rem;
    }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <div class="content">
    <p class="eyebrow">Lost Signal</p>
    <h1>This page does not exist.</h1>
    <p>The page you are looking for may have been moved, deleted, or never existed. But the protocol continues.</p>
    <div class="links">
      <a href="/" class="link-btn primary">Return Home</a>
      <a href="/products" class="link-btn">Explore Products</a>
      <a href="/protocol" class="link-btn">The Protocol</a>
    </div>
  </div>
  <div class="footer">© 2025 Zero Lines</div>
</body>
</html>
