<!doctype html>
<html lang="en-GB">
  <head>
    <!-- AUTO-RELOAD on product page navigation: intercepts React Router pushState
         and forces a clean hard refresh so product pages always load correctly -->
    

    <!-- Sticky Product Bar -->
    <div class="zl-sticky-product-bar" id="zl-sticky-product-bar">
      <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;">
        <span class="product-name" id="zl-sticky-product-name">Product Name</span>
        <span class="product-price" id="zl-sticky-product-price"></span>
      </div>
      <a href="https://wa.me/35054005198?text=Hello%20Zero%20Lines%2C%20I%27m%20interested%20in%20the%20Precision%20Collagen%20Activation%20Syringe." class="btn-whatsapp" id="zl-sticky-cta" target="_blank" rel="noopener">Pre-Order on WhatsApp</a>
    </div>
    <script>
    (function() {
      var bar = document.getElementById('zl-sticky-product-bar');
      if (!bar) return;
      // Show after scrolling past hero
      var hero = document.querySelector('section:first-of-type');
      function update() {
        var threshold = hero ? hero.offsetHeight * 0.6 : 400;
        bar.classList.toggle('is-visible', (window.scrollY || window.pageYOffset) > threshold);
      }
      window.addEventListener('scroll', update, { passive: true });
      update();
    })();
    </script>
    <script>document.getElementById('zl-sticky-product-name').textContent = 'Precision Collagen Activation Syringe';</script>
  </body>
</html>
